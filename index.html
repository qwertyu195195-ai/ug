<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body {
        background: linear-gradient(135deg, #f2f2f2, #d9d9d9);


        overflow-x: hidden;
        /* يقطع أي عنصر يحاول الخروج عن حافة الموبايل يميناً أو يساراً */


    }

    /* تخصيص شريط التمرير */
    ::-webkit-scrollbar {
        height: 6px;
        /* ارتفاع الشريط الأفقي */
    }

    ::-webkit-scrollbar-track {
        background: linear-gradient(135deg, #c0c0c0, #d9d9d9);
        /* خلفية المسار */
    }

    ::-webkit-scrollbar-thumb {
        background: linear-gradient(135deg, #f2f2f2, #d9d9d9);
        /* لون المقبض */
        border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
        background: linear-gradient(135deg, #f2f2f2, #d9d9d9);
        /* لون عند المرور عليه */
    }

    /* الحاوية الخارجية المحددة لأبعاد البنر الإعلاني */
    .slider-container {
        position: relative;
        width: 100%;
        max-width: 100%;
        margin: 15px 0;
        overflow: hidden;

        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
    }

    /* سكة التمرير الأفقي السلس التي تسمح بالسحب بالإصبع */
    .slider-wrapper {
        display: flex;
        overflow-x: auto;
        /* تفعيل التمرير الأفقي */
        scroll-snap-type: x mandatory;
        /* إجبار الصورة على الاستقرار بالمنتصف عند السحب */
        scroll-behavior: smooth;
        -webkit-overflow-scrolling: touch;
        /* سحب فائق النعومة لهواتف الآيفون */
    }

    /* إخفاء شريط التمرير الرمادي البشع لتبدو كأنها تطبيق حقيقي */
    .slider-wrapper::-webkit-scrollbar {
        display: none;
    }

    /* ضبط مقاسات كل صورة (Slide) لتأخذ كامل عرض الشاشة المتاحة */
    .slide {
        min-width: 100%;
        width: 100%;
        scroll-snap-align: start;
        /* نقطة وقوف الصورة وتثبيتها */
    }

    .slide img {
        width: 100%;
        height: auto;
        max-height: 160px;
        /* تحديد الارتفاع ليتطابق مع قياس صورتك المرفقة */
        object-fit: cover;
        display: block;
    }

    /* حاوية النقاط السفليّة وتوسيطها */
    .slider-dots {
        position: absolute;
        bottom: 12px;
        left: 50%;
        transform: translateX(-50%);
        /* وضع النقاط في المنتصف تماماً */
        display: flex;
        gap: 6px;
        direction: ltr;
        /* ترتيب النقاط من اليسار لليمين */
    }

    /* تصميم النقاط الدائرية البيضاء الخافتة */
    .dot {
        width: 8px;
        height: 8px;
        background-color: rgba(255, 255, 255, 0.4);
        border-radius: 50%;
        transition: all 0.3s ease;
    }

    /* النقطة النشطة السوداء العريضة تماماً كالصورة المرفقة */
    .dot.active {
        background-color: #000000;
        /* لون أسود */
        width: 20px;
        /* جعلها مستطيلة ونشطة */
        border-radius: 4px;
    }

    .q {
        position: absolute;
        top: 1px;
        font-size: 22px;
    }




    .w {
        position: absolute;
        top: 1px;
        right: 2px;
        cursor: pointer;
    }

    .r {
        text-align: center;
        position: absolute;
        top: 1;
        right: 160px;
        font-size: 22px;
    }

    input {
        position: absolute;
        top: 60px;
        width: 95%;
        height: 40px;
        background: #c9c9c96e;
        border-radius: 10px;
        border: none;
        text-align: right;
        font-size: 20px;
    }

    .op {
        position: absolute;
        top: 110px;

    }

    .op img {
        max-width: 100%;
        width: 100%;
    }

    /* 1. الصندوق الأب المحيط بالكروت لترتيبها بالعرض (بصف بعض) */
    .nm {
        display: grid;
        gap: 60px;
        grid-template-columns: repeat(2, 3fr);
        padding: 10px;
        box-sizing: border-box;
        direction: rtl;
        /* توجيه الترتيب بانتظام من اليمين لليسار */
    }

    /* 2. تنسيق الكارت الفردي المتجاوب ليتوافق مع كل شاشات الموبايل */
    .jk {

        border-radius: 10px;
        border: none;
        /* إطارك البرتقالي الأصلي */

        text-align: center;


        transition: transform 0.3s ease;
        display: flex;
        justify-content: flex-start;
        flex-direction: column;
        width: 100%;


        /* قمنا بحذف الـ width الثابت والـ 100% المتعارضين، ليأخذ الكارت مقاسه التلقائي من الأب */
    }







    .jk img,
    .ppp {
        width: 100%;
        height: 160px;
        object-fit: contain;
        border-radius: 10px;
        display: block;
        margin: 0 auto;
        /* ✅ الخاصية السحرية لدمج وإخفاء ألوان خلفيات الصور المختلفة */
        mix-blend-mode: multiply;
        padding: 10px;

    }






    span {
        color: rgb(255, 72, 0);
        font-size: 20px;
        font-weight: bold;
    }

    button {
        border: none;
        font-size: 30px;
        border-radius: 10px;
        background: #ffffff;
        cursor: pointer;
        border: none;
        transition: transform 0.3s;
    }

    button:hover {
        border: 2px solid #ff0606;
        transform: translateY(-5px);
    }




    /* تجبر الأزرار على التباعد والتوزع بالتساوي */






    .pppp {
        font-size: 20px;
    }
</style>

<body>

<script>
    // عدد المنتجات + المجموع الكلي
    let cartCount = 0;
    let totalPrice = 0;

    // تحديد كل أزرار الشراء
    const buyButtons = document.querySelectorAll("button");

    // أيقونة السلة
    const cartIcon = document.querySelector(".w");

    // إنشاء عداد صغير بجانب السلة
    const counter = document.createElement("span");
    counter.style.position = "absolute";
    counter.style.top = "0";
    counter.style.right = "25px";
    counter.style.background = "red";
    counter.style.color = "white";
    counter.style.borderRadius = "50%";
    counter.style.padding = "2px 6px";
    counter.style.fontSize = "14px";
    counter.textContent = cartCount;
    document.querySelector(".io").appendChild(counter);

    // عند الضغط على زر شراء
    buyButtons.forEach(btn => {
        btn.addEventListener("click", () => {
            cartCount++;
            totalPrice += 24000; // سعر القميص الواحد
            counter.textContent = cartCount;
        });
    });

    // إنشاء صندوق منبثق للسلة
    const cartBox = document.createElement("div");
    cartBox.style.position = "fixed";
    cartBox.style.top = "50%";
    cartBox.style.left = "50%";
    cartBox.style.transform = "translate(-50%, -50%)";
    cartBox.style.background = "#fff";
    cartBox.style.padding = "20px";
    cartBox.style.borderRadius = "10px";
    cartBox.style.boxShadow = "0 4px 10px rgba(0,0,0,0.3)";
    cartBox.style.display = "none";
    cartBox.style.textAlign = "center";
    document.body.appendChild(cartBox);

    const cartText = document.createElement("p");
    cartBox.appendChild(cartText);

    const confirmBtn = document.createElement("button");
    confirmBtn.textContent = "تم شراء ✅";
    confirmBtn.style.marginTop = "10px";
    confirmBtn.style.background = "green";
    confirmBtn.style.color = "white";
    confirmBtn.style.padding = "5px 10px";
    confirmBtn.style.borderRadius = "5px";
    cartBox.appendChild(confirmBtn);

    // عند الضغط على السلة
    cartIcon.addEventListener("click", () => {
        if (cartCount > 0) {
            cartText.textContent = "عدد المنتجات: " + cartCount + " | المجموع: " + totalPrice + " د.ع";
            cartBox.style.display = "block";
        } else {
            alert("السلة فارغة 🛒");
        }
    });

    // عند الضغط على زر تم شراء
    confirmBtn.addEventListener("click", () => {
        alert("تم شراء " + cartCount + " منتجات بمجموع " + totalPrice + " د.ع 🎉");
        cartBox.style.display = "none";
        cartCount = 0;
        totalPrice = 0;
        counter.textContent = cartCount;
    });
</script>
